<div class="shop-header">
  <h1>Discover</h1>
  <div class="filter">
    <label for="category">Category</label>
    <select id="category" [(ngModel)]="selectedCategory" (ngModelChange)="onCategoryChange()">
      <option value="">All</option>
      <option value="Electronics">Electronics</option>
      <option value="Sports">Sports</option>
      <option value="Accessories">Accessories</option>
      <option value="Home">Home</option>
    </select>
  </div>
</div>

<div class="loading" *ngIf="loading">Loading products...</div>

<div class="product-grid" *ngIf="!loading && products.length">
  <article class="product-card" *ngFor="let product of products">
    <div class="product-image">
      <img [src]="product.imageUrl" [alt]="product.name" loading="lazy" />
    </div>
    <div class="product-body">
      <span class="category">{{ product.category }}</span>
      <h2>{{ product.name }}</h2>
      <p class="description">{{ product.description }}</p>
      <div class="product-footer">
        <span class="price">₹{{ product.price | number: '1.2-2' }}</span>
        <div class="quantity-controls" *ngIf="getQuantity(product.id) > 0">
          <button type="button" class="btn-qty" (click)="decrease(product)" aria-label="Decrease">−</button>
          <span class="qty-value">{{ getQuantity(product.id) }}</span>
          <button type="button" class="btn-qty" (click)="increase(product)" aria-label="Increase">+</button>
        </div>
        <button type="button" class="btn-add" *ngIf="getQuantity(product.id) === 0" (click)="addToCart(product)">
          Add to cart
        </button>
      </div>
    </div>
  </article>
</div>

<p class="empty" *ngIf="!loading && !products.length">No products found.</p>
