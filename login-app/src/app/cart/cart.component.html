<h1>Your cart</h1>

<div class="empty-cart" *ngIf="!items.length">
  <p>Your cart is empty.</p>
  <a routerLink="/shop" class="link">Continue shopping</a>
</div>

<div class="cart-content" *ngIf="items.length">
  <div class="cart-list">
    <div class="cart-item" *ngFor="let item of items">
      <div class="item-image">
        <img [src]="item.product.imageUrl" [alt]="item.product.name" />
      </div>
      <div class="item-details">
        <h3>{{ item.product.name }}</h3>
        <p class="item-price">₹{{ item.product.price | number: '1.2-2' }} each</p>
        <div class="quantity-row">
          <label>Qty</label>
          <div class="qty-controls">
            <button type="button" (click)="updateQuantity(item.product.id, item.quantity - 1)">−</button>
            <span>{{ item.quantity }}</span>
            <button type="button" (click)="updateQuantity(item.product.id, item.quantity + 1)">+</button>
          </div>
          <button type="button" class="btn-remove" (click)="remove(item.product.id)">Remove</button>
        </div>
      </div>
      <div class="item-total">
        ₹{{ (item.product.price * item.quantity) | number: '1.2-2' }}
      </div>
    </div>
  </div>

  <div class="cart-summary">
    <p><strong>Items:</strong> {{ totalCount }}</p>
    <p class="total"><strong>Total:</strong> ₹{{ totalPrice | number: '1.2-2' }}</p>
    <a routerLink="/checkout" class="btn-checkout">Proceed to checkout</a>
  </div>
</div>
