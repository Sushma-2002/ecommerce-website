<div class="login-container">
  <div class="login-card">
    <h1>Sign in</h1>
    <p class="subtitle">Use your username and password</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="username">Username</label>
        <input
          id="username"
          type="text"
          formControlName="username"
          placeholder="Enter username"
          autocomplete="username"
        />
        <span class="error" *ngIf="loginForm.get('username')?.touched && loginForm.get('username')?.errors?.['required']">
          Username is required
        </span>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="Enter password"
          autocomplete="current-password"
        />
        <span class="error" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.errors?.['required']">
          Password is required
        </span>
      </div>

      <div class="message error" *ngIf="errorMessage">{{ errorMessage }}</div>
      <div class="message success" *ngIf="successMessage">{{ successMessage }}</div>

      <button type="submit" class="btn-login" [disabled]="loading">
        {{ loading ? 'Signing in...' : 'Sign in' }}
      </button>

      <p class="register-link">
        Don't have an account? <a routerLink="/register">Create one</a>
      </p>
    </form>
  </div>
</div>
